<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Filey Diaries" />
  <meta name="theme-color" content="#1a6b9a" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>Filey Diaries</title>
  <link rel="stylesheet" href="app.css" />
</head>
<body>

  <header>
    <div class="header-inner">
      <button id="prev-btn">‹</button>
      <div class="header-title">
        <h1>Filey Diaries</h1>
        <span id="month-label"></span>
      </div>
      <button id="next-btn">›</button>
    </div>
  </header>

  <div class="day-names">
    <span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span><span>Sun</span>
  </div>

  <div id="calendar" class="calendar"></div>

  <!-- Day modal -->
  <div id="modal" class="modal hidden">
    <div class="backdrop"></div>
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-header">
        <h2 id="modal-date-label"></h2>
        <button id="modal-close">✕</button>
      </div>
      <div class="sheet-body">
        <div id="photo-grid" class="photo-grid"></div>
        <label class="add-photo-btn">
          <span>＋ Add photos</span>
          <input type="file" id="photo-input" accept="image/*" multiple />
        </label>
        <textarea id="notes-input" placeholder="Write about your day at Filey…"></textarea>
      </div>
      <div class="sheet-footer">
        <button id="save-btn">Save</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
