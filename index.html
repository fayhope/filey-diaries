<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Filey Diaries" />
  <meta name="theme-color" content="#1a6b9a" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>Filey Diaries</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="app.css" />
</head>
<body>

  <!-- PASSWORD SCREEN -->
  <div id="lock-screen">
    <div class="lock-card">
      <div class="lock-wave">🌊</div>
      <h1>Filey Diaries</h1>
      <p>Enter password to continue</p>
      <input type="password" id="password-input" placeholder="Password" />
      <button id="password-btn">Unlock</button>
      <p id="password-error" class="pw-error hidden">Wrong password, try again</p>
    </div>
  </div>

  <!-- APP -->
  <div id="app" class="hidden">

    <div id="map"></div>
    <div class="map-overlay"></div>

    <!-- HOME VIEW -->
    <div id="view-home" class="view active">
      <div class="view-scroll">
        <div class="home-hero">
          <div class="hero-wave">🌊</div>
          <h1>Filey Diaries</h1>
          <p class="hero-sub">Your seaside story</p>
        </div>
        <div class="stats-grid">
          <div class="stat-card wide">
            <div class="stat-label">Days in Filey</div>
            <div class="stat-value" id="stat-days">—</div>
            <div class="stat-sub" id="stat-days-sub"></div>
            <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
          </div>
          <div class="stat-card">
            <div class="stat-emoji">🏕️</div>
            <div class="stat-label">Trips</div>
            <div class="stat-value" id="stat-trips">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-emoji">🐱</div>
            <div class="stat-label">Salah trips</div>
            <div class="stat-value" id="stat-salah">—</div>
          </div>
        </div>
        <div class="people-section">
          <h2>People 👥</h2>
          <div id="people-list" class="people-list"></div>
        </div>
      </div>
    </div>

    <!-- CALENDAR VIEW -->
    <div id="view-calendar" class="view">
      <div class="cal-header">
        <button id="prev-btn">‹</button>
        <div class="cal-title">
          <div class="title-text">🌊 Filey Diaries</div>
          <span id="month-label"></span>
        </div>
        <button id="next-btn">›</button>
      </div>
      <div class="day-names">
        <span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span><span>Sun</span>
      </div>
      <div id="calendar" class="calendar"></div>
    </div>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
      <button class="nav-btn active" data-view="home"><span>🏠</span><span>Home</span></button>
      <button class="nav-btn" data-view="calendar"><span>📅</span><span>Calendar</span></button>
    </nav>

    <!-- Day modal -->
    <div id="modal" class="modal hidden">
      <div class="backdrop"></div>
      <div class="sheet">
        <div class="sheet-handle"></div>
        <div class="sheet-header">
          <h2 id="modal-date-label"></h2>
          <button id="modal-close">✕</button>
        </div>

        <!-- SCRAPBOOK VIEW -->
        <div id="scrapbook-view" class="scrapbook-book hidden">
          <div class="scrapbook-left">
            <div id="scrapbook-photos" class="scrapbook-photos"></div>
          </div>
          <div class="scrapbook-right">
            <div id="scrapbook-chips" class="scrapbook-chips"></div>
            <p id="scrapbook-notes" class="scrapbook-notes"></p>
          </div>
        </div>
        <div id="scrapbook-footer" class="sheet-footer two-btn hidden">
          <button id="edit-btn" class="btn-outline">✏️ Edit</button>
          <button id="remove-btn" class="btn-danger">🗑 Remove</button>
        </div>

        <!-- EDIT VIEW -->
        <div id="edit-view" class="sheet-body hidden">
          <div class="modal-row">
            <span class="modal-row-label">🐱 Salah came</span>
            <label class="toggle-wrap">
              <input type="checkbox" id="salah-toggle" />
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div class="section-label">Who came?</div>
          <div id="companion-tags" class="companion-tags"></div>
          <div class="companion-row">
            <input type="text" id="companion-input" placeholder="Add a person…" />
            <button id="companion-add">Add</button>
          </div>
          <div class="section-label">Photos</div>
          <div id="photo-grid" class="photo-grid"></div>
          <label class="add-photo-btn" id="add-photo-label">
            <span>＋ Add photos</span>
            <input type="file" id="photo-input" accept="image/*" multiple />
          </label>
          <div class="section-label">Notes</div>
          <textarea id="notes-input" placeholder="Write about your day at Filey…"></textarea>
        </div>
        <div id="edit-footer" class="sheet-footer hidden">
          <button id="save-btn">Save</button>
        </div>

        <!-- LOADING STATE -->
        <div id="modal-loading" class="modal-loading hidden">
          <div class="spinner"></div>
          <span>Saving…</span>
        </div>
      </div>
    </div>

  </div><!-- /app -->

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="app.js"></script>
</body>
</html>
